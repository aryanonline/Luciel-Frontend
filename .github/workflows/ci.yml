name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ── Unit / lint / build gates ────────────────────────────────────────────────
  build:
    name: Typecheck · Test · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Unit tests (all packages)
        run: pnpm -r test

      - name: Lint (@luciel/web)
        run: pnpm --filter @luciel/web lint

      - name: Build (all packages)
        run: pnpm -r build

      - name: Widget bundle check — no admin surface
        run: node apps/widget/scripts/check-bundle.mjs

  # ── WCAG 2.1 AA accessibility gate (Commitment §30 / Axis11-F04) ─────────────
  # This is a REQUIRED gate: a PR that introduces AA violations is rejected.
  a11y:
    name: A11y — WCAG 2.1 AA (Playwright + axe-core)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @luciel/web exec playwright install --with-deps chromium

      - name: Run a11y e2e (axe-core/playwright, WCAG 2.1 AA)
        run: pnpm --filter @luciel/web test:e2e
